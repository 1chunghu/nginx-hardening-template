# Catch-all default server: drop any request whose Host header matches no
# configured site. Without this, a request with an unknown/spoofed Host falls
# through to the alphabetically-first server block — which can leak that block's
# app or reflect the attacker-supplied Host into a generated base href.
# 444 closes the connection with no response.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/certs/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 444;
}
