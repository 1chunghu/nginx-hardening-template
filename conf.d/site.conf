server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name example.com www.example.com;

    ssl_certificate     /etc/nginx/certs/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/example.com;
    index index.html;
    error_page 404 /404.html;

    # A server block that declares any add_header stops inheriting the http-level
    # headers, so the full set is re-listed here. This CSP targets a static site
    # whose inline <script>/<style> have all been externalised — that is what lets
    # script-src drop 'unsafe-inline' (the key to an A+ / no-XSS-sink policy).
    #
    # Placeholders to replace for your own deployment:
    #   https://analytics.example.com  -> your self-hosted analytics origin (or remove)
    #   https://api.example.com        -> any third-party API your frontend fetch()es (or remove)
    # If you have no external script/analytics at all, tighten to:
    #   script-src 'self';  connect-src 'self';
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy   "default-src 'none'; script-src 'self' https://analytics.example.com; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; connect-src 'self' https://analytics.example.com https://api.example.com; frame-src 'self'; manifest-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Content-hashed / version-queried assets: long immutable cache.
    # Use expires (not add_header Cache-Control) so it doesn't break the
    # security-header inheritance chain above.
    location ~* ^/(fonts|badges|css|js)/ {
        expires 1y;
        try_files $uri =404;
    }

    # Root-level assets with no versioning: medium cache so updates aren't stuck.
    location = /favicon.svg {
        expires 7d;
        try_files $uri =404;
    }
    location = /og-image.png {
        expires 7d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
