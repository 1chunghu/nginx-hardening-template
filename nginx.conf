user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS (only needed if you proxy_pass to container names).
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Don't leak the nginx version in Server: headers or error pages.
    server_tokens off;

    # Global baseline headers. NOTE: nginx add_header does NOT inherit into a
    # server/location block that declares its own add_header — any block that
    # sets even one header must re-list the full set (see conf.d/site.conf).
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";
    add_header Referrer-Policy         "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000" always;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}
